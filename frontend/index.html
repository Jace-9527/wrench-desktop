<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wrench Desktop</title>
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="app-sidebar">
      <div class="app-sidebar-brand">
        <div class="app-sidebar-logo">W</div>
        <div class="app-sidebar-brand-text">
          <strong>Wrench</strong>
          <span>桌面工具箱</span>
        </div>
        <button id="toggleLeftPanel" class="panel-toggle" type="button" title="折叠左侧栏">‹</button>
      </div>
      <div class="app-sidebar-search">
        <input id="toolSearch" type="search" placeholder="搜索工具、别名或用途" autocomplete="off">
        <button id="toolSearchClear" class="btn secondary" type="button">清空</button>
      </div>
      <nav id="sidebarTools" class="app-sidebar-tools" aria-label="工具列表"></nav>
      <button id="leftPanelExpand" class="panel-rail-button" type="button" title="展开左侧栏">›</button>
      <div id="leftResizeHandle" class="resize-handle resize-handle-left" role="separator" aria-orientation="vertical" title="拖拽调整左侧栏宽度"></div>
    </aside>

    <main class="app-main">
      <header class="workspace-bar">
        <div>
          <strong id="workspaceTitle">工作台环境</strong>
          <span id="workspacePath">~/Wrench/Workspace/Dashboard</span>
        </div>
        <button class="workspace-view-button" type="button" aria-label="网格平台">
          <span class="workspace-grid-icon">▦</span>
          <span>网格平台</span>
        </button>
      </header>
      <div id="homeView" class="container">
        <div class="home-hero">
          <div class="home-privacy-brand">
            <div>
              <div class="home-privacy-title">Wrench</div>
              <div class="home-privacy-subtitle">桌面工具箱</div>
            </div>
          </div>
          <div class="home-hero-search">
            <input id="homeToolSearch" type="search" placeholder="搜索工具、别名或用途，例如 b64、csr、json" autocomplete="off">
            <button class="btn" id="homeToolSearchClear" type="button">清空</button>
          </div>
        </div>

        <main class="tool-board">
          <section class="tool-section">
            <div class="section-title">
              <h2 id="toolListTitle">全部工具</h2>
              <span id="toolResultCount" class="section-count"></span>
            </div>
            <div id="toolGroups" class="tool-groups"></div>
            <div id="emptyTools" class="empty-state" hidden>没有匹配的工具</div>
          </section>
        </main>
      </div>

      <div id="toolView" class="container tool-view" hidden>
        <header class="tool-header">
          <div>
            <div class="tool-header-actions">
              <button id="backHome" class="btn secondary" type="button">全部工具</button>
              <button id="openToolWindow" class="btn secondary" type="button">新窗口</button>
            </div>
            <p id="toolCategory" class="eyebrow"></p>
            <h1 id="toolName"></h1>
            <p id="toolDesc" class="tool-desc"></p>
          </div>
        </header>

        <div id="genericWorkspace">
          <section class="generic-grid">
            <div class="card half">
              <h2>输入</h2>
              <div class="toolbar generic-input-toolbar">
                <button id="primaryAction" class="btn" type="button">转换</button>
                <button id="secondaryAction" class="btn secondary" type="button" hidden></button>
                <button id="clearInput" class="btn secondary" type="button">清空</button>
                <button id="fullscreenInput" class="btn secondary" type="button">全屏</button>
                <div class="small">快捷键：<span class="kbd">Ctrl</span>/<span class="kbd">Cmd</span> + <span class="kbd">Enter</span></div>
              </div>
              <section id="toolOptions" class="tool-options" hidden></section>
              <textarea id="inputText" spellcheck="false"></textarea>
              <div id="statusText" class="status"></div>
            </div>
            <div class="card half">
              <h2>输出</h2>
              <div class="toolbar">
                <button id="copyOutput" class="btn secondary" type="button">复制输出</button>
                <button id="fullscreenOutput" class="btn secondary" type="button">全屏</button>
              </div>
              <textarea id="outputText" spellcheck="false" readonly></textarea>
            </div>
          </section>

          <section id="resultDetails" class="card result-details" hidden></section>
        </div>

        <div id="jsonWorkspace" class="json-workspace" hidden>
          <section class="json-grid">
            <div class="card half">
              <h2>输入</h2>
              <div class="toolbar">
                <button class="btn" id="jsonFormat" type="button">格式化</button>
                <button class="btn secondary" id="jsonMinify" type="button">压缩</button>
                <button class="btn secondary" id="jsonClear" type="button">清空</button>
                <button class="btn secondary" id="jsonFullscreenInput" type="button">全屏</button>
                <div class="small">快捷键：<span class="kbd">Ctrl</span>/<span class="kbd">Cmd</span> + <span class="kbd">Enter</span></div>
              </div>
              <textarea class="textarea" id="jsonInput" spellcheck="false" placeholder='粘贴 JSON 数据，例如：

{"name":"test","age":18,"items":["a","b","c"]}

也支持日志行里夹带 JSON：

2026-06-03T10:24:59 stderr F {"ok":true}'></textarea>
              <div id="jsonStatus" class="status"></div>
            </div>

            <div class="card half">
              <h2>输出</h2>
              <div class="toolbar">
                <button class="btn secondary" id="jsonCopy" type="button" disabled>复制</button>
                <button class="btn secondary" id="jsonFullscreenOutput" type="button">全屏</button>
                <button class="btn secondary" id="jsonSave" type="button" disabled>保存文件</button>
                <button class="btn secondary" id="jsonExpand" type="button">展开全部</button>
                <button class="btn secondary" id="jsonCollapse" type="button">收起全部</button>
                <button class="btn secondary" id="jsonTableButton" type="button" disabled>表格视图</button>
              </div>
              <div class="json-output-box">
                <textarea class="textarea json-output-source" id="jsonOutput" spellcheck="false" placeholder="格式化或压缩后的结果将显示在这里"></textarea>
                <div class="json-editor" id="jsonOutputEditor" hidden></div>
              </div>
            </div>

            <div class="card json-table-card" id="jsonTableCard" hidden>
              <div class="section-title">
                <h2>表格视图</h2>
                <span id="jsonTableSummary"></span>
              </div>
              <div class="json-field-list" id="jsonFieldList"></div>
              <div class="json-table-wrap" id="jsonTableContainer"></div>
            </div>
          </section>
        </div>
      </div>
    </main>

    <aside class="history-panel">
      <button id="toggleRightPanel" class="panel-toggle history-panel-toggle" type="button" title="折叠历史栏">›</button>
      <div class="history-head">
        <div>
          <strong>历史记录</strong>
          <span id="historyPath"></span>
        </div>
        <div class="history-actions">
          <button id="exportHistoryJSON" class="btn secondary" type="button">导出 JSON</button>
          <button id="exportHistoryCSV" class="btn secondary" type="button">导出 CSV</button>
          <button id="clearHistory" class="btn danger" type="button">清空</button>
        </div>
      </div>
      <div class="history-scope" role="group" aria-label="历史范围">
        <button id="historyCurrent" class="scope-button active" type="button">当前工具</button>
        <button id="historyAll" class="scope-button" type="button">全部历史</button>
      </div>
      <input id="historySearch" class="history-search" type="search" placeholder="搜索历史" autocomplete="off">
      <div id="historyList" class="history-list"></div>
      <button id="rightPanelExpand" class="panel-rail-button" type="button" title="展开历史栏">‹</button>
      <div id="rightResizeHandle" class="resize-handle resize-handle-right" role="separator" aria-orientation="vertical" title="拖拽调整历史栏宽度"></div>
    </aside>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
